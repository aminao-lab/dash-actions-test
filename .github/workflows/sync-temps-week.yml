name: 📅 Sync Temps Semaine

on:
  schedule:
    - cron: "40 1 * * 1"   # tous les lundis à 01h40
  workflow_dispatch:

concurrency:
  group: sync-temps-semaine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        job_index: [0, 1, 2, 3]   # 4 jobs parallèles

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json

      - name: ⏱️ Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🔄 Sync Temps Week (Job ${{ matrix.job_index }}/4)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_BASE_URL: ${{ secrets.LW_BASE_URL }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          LW_CLIENT_ID: ${{ secrets.LW_CLIENT_ID }}
          JOB_INDEX: ${{ matrix.job_index }}
          TOTAL_JOBS: 4
        run: |
          cd refonte-dashboard/sync
          php sync_temps_week.php

      - name: ⏱️ End Timer
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "⏱️ Durée Job ${{ matrix.job_index }}: ${DURATION}s"

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temps-week-logs-job-${{ matrix.job_index }}
          path: refonte-dashboard/logs/
          if-no-files-found: ignore
          retention-days: 7

  verify:
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ✅ Résumé
        run: echo "🎉 Synchronisation hebdomadaire terminée !"
